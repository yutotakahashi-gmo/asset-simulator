<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>資産形成シミュレーター</title>
<!-- iPhone（ホーム画面に追加）対応 -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資産形成">
<meta name="theme-color" content="#0a0e17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
  :root{
    --bg:#0a0e17; --panel:#121826; --panel2:#1a2235;
    --accent:#00d4ff; --accent2:#0099ff; --text:#e6edf5;
    --muted:rgba(255,255,255,0.6); --border:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text);
    line-height:1.6; padding:40px; min-height:100vh;
  }
  .wrap{max-width:1400px;margin:0 auto}
  header{margin-bottom:30px}
  header h1{font-size:32px;font-weight:700;letter-spacing:-0.5px}
  header p{font-size:14px;opacity:0.6;margin-top:4px}

  .gears{display:flex;gap:12px;margin:24px 0}
  .gear{
    background:var(--panel2);color:var(--muted);border:1px solid var(--border);
    padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;
    font-family:inherit;transition:all .2s;
  }
  .gear:hover{border-color:var(--accent);color:var(--text)}
  .gear.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#001018;border-color:transparent;font-weight:700;
  }

  .layout{display:grid;grid-template-columns:400px 1fr;gap:30px;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:30px}

  /* 条件入力：横一列のコンパクト行 */
  .top-conditions{
    display:flex;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:22px;
    padding-bottom:20px;border-bottom:1px solid var(--border);
  }
  .top-conditions .heading{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);width:100%}
  .mini{display:flex;flex-direction:column;gap:6px}
  .mini label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .mini input{width:90px}

  .stages-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .stages-head .ttl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .add-btn{
    background:var(--panel2);color:var(--accent);border:1px solid var(--accent);
    border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:all .2s;
  }
  .add-btn:hover{background:var(--accent);color:#001018}
  .add-btn:disabled{opacity:.35;cursor:not-allowed;background:var(--panel2);color:var(--muted);border-color:var(--border)}

  .stage{background:var(--panel2);border-radius:12px;padding:16px;margin-bottom:14px;position:relative}
  .stage h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:12px}
  .stage .del{
    position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:6px;
    background:rgba(255,255,255,0.06);border:none;color:var(--muted);cursor:pointer;
    font-size:16px;line-height:1;transition:all .2s;
  }
  .stage .del:hover{background:rgba(255,80,80,0.25);color:#ff8a8a}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .ctl label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  input[type=number]{
    width:100%;background:#0a0e17;border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;transition:all .2s;
  }
  input[type=number]:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,0.15)}

  .results{display:flex;flex-direction:column;gap:22px}
  .result-main{text-align:center;padding:6px 0}
  .result-main .cap{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  .result-main .val{
    font-size:40px;font-weight:700;line-height:1.2;word-break:break-all;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .milestones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .ms{background:var(--panel2);border-radius:12px;padding:16px;text-align:center}
  .ms .cap{font-size:11px;color:var(--muted)}
  .ms .age{font-size:24px;font-weight:700;color:var(--accent);margin-top:4px}

  .charts{display:grid;grid-template-columns:1.6fr 1fr;gap:24px;margin-top:24px}
  .chart-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;min-width:0}
  .chart-box h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px}
  .chart-canvas{position:relative;height:300px}

  .table-wrap{margin-top:24px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;overflow-x:auto}
  .table-wrap h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th,td{padding:9px 12px;text-align:right;white-space:nowrap}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  td:first-child,th:first-child{text-align:left}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s}
  tbody tr:hover{background:rgba(255,255,255,0.04)}
  tbody tr.reached{background:rgba(0,212,255,0.1)}
  tbody tr.reached:hover{background:rgba(0,212,255,0.16)}
  td.res{color:var(--accent);font-weight:500}

  @media(max-width:1200px){
    .layout{grid-template-columns:1fr}
    .charts{grid-template-columns:1fr}
  }
  @media(max-width:768px){
    body{padding:20px}
    .grid3{grid-template-columns:1fr}
    header h1{font-size:26px}
    .gears{flex-wrap:wrap}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>資産形成シミュレーター</h1>
    <p>積立・運用プランで資産推移を試算します（最大10段階）</p>
  </header>

  <div class="gears">
    <button class="gear" data-mode="aggressive" onclick="applyMode('aggressive')">積極</button>
    <button class="gear active" data-mode="standard" onclick="applyMode('standard')">標準</button>
    <button class="gear" data-mode="conservative" onclick="applyMode('conservative')">保守</button>
  </div>

  <div class="layout">
    <!-- 入力 -->
    <div class="panel">
      <div class="top-conditions">
        <span class="heading">条件入力</span>
        <div class="mini"><label>開始年齢</label><input type="number" id="startAge" value="24"></div>
        <div class="mini"><label>初期資産（万円）</label><input type="number" id="initial" value="1000"></div>
      </div>

      <div class="stages-head">
        <span class="ttl">運用段階</span>
        <button class="add-btn" id="addBtn" onclick="addStage()">＋ 段階を追加</button>
      </div>
      <div id="stages"></div>
    </div>

    <!-- 結果 -->
    <div class="panel">
      <div class="results">
        <div class="result-main">
          <div class="cap">最終運用結果</div>
          <div class="val" id="finalVal">¥0</div>
        </div>
        <div class="milestones">
          <div class="ms"><div class="cap">1億円 達成</div><div class="age" id="ms1">−</div></div>
          <div class="ms"><div class="cap">2億円 達成</div><div class="age" id="ms2">−</div></div>
          <div class="ms"><div class="cap">5億円 達成</div><div class="age" id="ms5">−</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h3>資産推移</h3>
      <div class="chart-canvas"><canvas id="lineChart"></canvas></div>
    </div>
    <div class="chart-box">
      <h3>内訳（最終）</h3>
      <div class="chart-canvas"><canvas id="doughnutChart"></canvas></div>
    </div>
  </div>

  <div class="table-wrap">
    <h3>年次推移</h3>
    <table>
      <thead>
        <tr>
          <th>年（歳）</th><th>元本</th><th>年間積立</th><th>積立合計</th>
          <th>年間利息</th><th>利息合計</th><th>結果</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const MAX_STAGES=10;
// 各モードの初期3段階プリセット {end, m(万円), r(%)}
const MODES={
  aggressive:[{end:35,m:40,r:18},{end:60,m:20,r:18},{end:80,m:12,r:6}],
  standard:  [{end:35,m:30,r:15},{end:60,m:15,r:15},{end:80,m:10,r:4}],
  conservative:[{end:35,m:20,r:7},{end:60,m:10,r:7},{end:80,m:8,r:3}]
};
let stages = JSON.parse(JSON.stringify(MODES.standard)); // 現在の段階配列
let lineChart=null, doughnutChart=null;

const yen = n => '¥'+Math.round(n).toLocaleString('ja-JP');
const num = id => { const v=parseFloat(document.getElementById(id).value); return isNaN(v)?0:v; };

function renderStages(){
  const box=document.getElementById('stages');
  box.innerHTML = stages.map((st,i)=>`
    <div class="stage">
      <h3>第${i+1}段階</h3>
      ${stages.length>1?`<button class="del" title="削除" onclick="removeStage(${i})">×</button>`:''}
      <div class="grid3">
        <div class="ctl"><label>終了年齢</label><input type="number" data-i="${i}" data-k="end" value="${st.end}"></div>
        <div class="ctl"><label>月積立（万円）</label><input type="number" data-i="${i}" data-k="m" value="${st.m}"></div>
        <div class="ctl"><label>年利（%）</label><input type="number" data-i="${i}" data-k="r" value="${st.r}"></div>
      </div>
    </div>`).join('');
  // 段階入力にリスナー付与
  box.querySelectorAll('input[type=number]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const i=+e.target.dataset.i, k=e.target.dataset.k;
      const v=parseFloat(e.target.value); stages[i][k]=isNaN(v)?0:v; calculate();
    });
  });
  document.getElementById('addBtn').disabled = stages.length>=MAX_STAGES;
}

function addStage(){
  if(stages.length>=MAX_STAGES) return;
  const last=stages[stages.length-1];
  stages.push({end:(last?last.end+5:30), m:last?last.m:10, r:last?last.r:4});
  renderStages(); calculate();
}

function removeStage(i){
  if(stages.length<=1) return;
  stages.splice(i,1); renderStages(); calculate();
}

function applyMode(mode){
  document.querySelectorAll('.gear').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  stages = JSON.parse(JSON.stringify(MODES[mode]));
  renderStages(); calculate();
}

function calculate(){
  const start=num('startAge');
  const initial=num('initial')*10000;

  let asset=initial, contribTotal=0, interestTotal=0;
  let age=start;
  const rows=[], labels=[], totals=[];
  let hit1=null, hit2=null, hit5=null;

  for(const st of stages){
    const annual=st.m*10000*12;
    const r=st.r/100;
    let guard=0;
    while(age < st.end && guard<200){
      guard++;
      const interest = asset*r;
      asset = asset + interest + annual;
      contribTotal += annual;
      interestTotal += interest;
      age += 1;
      if(hit1===null && asset>=100000000) hit1=age;
      if(hit2===null && asset>=200000000) hit2=age;
      if(hit5===null && asset>=500000000) hit5=age;
      rows.push({age, principal:initial, annual, contribTotal, interest, interestTotal, total:asset, reached:asset>=200000000});
      labels.push(age+'歳');
      totals.push(Math.round(asset));
    }
  }

  document.getElementById('finalVal').textContent=yen(asset);
  document.getElementById('ms1').textContent = hit1!==null ? hit1+'歳' : '−';
  document.getElementById('ms2').textContent = hit2!==null ? hit2+'歳' : '−';
  document.getElementById('ms5').textContent = hit5!==null ? hit5+'歳' : '−';

  renderTable(rows);
  renderLine(labels,totals,rows);
  renderDoughnut(initial,contribTotal,interestTotal);
}

function renderTable(rows){
  document.getElementById('tbody').innerHTML = rows.map(r=>`
    <tr class="${r.reached?'reached':''}">
      <td>${r.age}歳</td>
      <td>${yen(r.principal)}</td>
      <td>${yen(r.annual)}</td>
      <td>${yen(r.contribTotal)}</td>
      <td>${yen(r.interest)}</td>
      <td>${yen(r.interestTotal)}</td>
      <td class="res">${yen(r.total)}</td>
    </tr>`).join('');
}

function renderLine(labels,data,rows){
  const ctx=document.getElementById('lineChart').getContext('2d');
  if(lineChart) lineChart.destroy();
  // 内訳系列（積み上げ）：元本 + 積立合計 + 利息合計 = 総資産
  const principal = rows.map(r=>Math.round(r.principal));
  const contrib   = rows.map(r=>Math.round(r.contribTotal));
  const interest  = rows.map(r=>Math.round(r.interestTotal));
  lineChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'元本',     data:principal, borderColor:'#0099ff', backgroundColor:'rgba(0,153,255,0.45)',  borderWidth:1.5, fill:true, tension:0.25, pointRadius:0, pointHoverRadius:4},
      {label:'積立合計', data:contrib,   borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,0.40)',  borderWidth:1.5, fill:true, tension:0.25, pointRadius:0, pointHoverRadius:4},
      {label:'利息合計', data:interest,  borderColor:'#7af0ff', backgroundColor:'rgba(122,240,255,0.35)',borderWidth:1.5, fill:true, tension:0.25, pointRadius:0, pointHoverRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'bottom',labels:{color:'rgba(255,255,255,0.6)',padding:12,boxWidth:12,font:{size:11}}},
        tooltip:{
          callbacks:{
            label:c=>c.dataset.label+': ¥'+c.parsed.y.toLocaleString('ja-JP'),
            footer:items=>{
              const t=items.reduce((s,i)=>s+i.parsed.y,0);
              return '総資産: ¥'+Math.round(t).toLocaleString('ja-JP');
            }
          },
          footerColor:'#00d4ff'
        }
      },
      scales:{
        x:{stacked:true,ticks:{color:'rgba(255,255,255,0.6)',maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{stacked:true,ticks:{color:'rgba(255,255,255,0.6)',callback:v=>'¥'+(v/100000000).toFixed(1)+'億'},grid:{color:'rgba(255,255,255,0.05)'}}
      }}
  });
}

function renderDoughnut(principal,contrib,interest){
  const ctx=document.getElementById('doughnutChart').getContext('2d');
  if(doughnutChart) doughnutChart.destroy();
  doughnutChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels:['元本','積立合計','利息合計'],
      datasets:[{data:[principal,contrib,interest],
        backgroundColor:['#0099ff','#00d4ff','#7af0ff'],borderColor:'#121826',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'bottom',labels:{color:'rgba(255,255,255,0.6)',padding:14,font:{size:12}}},
        tooltip:{callbacks:{label:c=>c.label+': ¥'+Math.round(c.parsed).toLocaleString('ja-JP')}}}}
  });
}

// 上部の固定inputにリスナー
['startAge','initial'].forEach(id=>{
  document.getElementById(id).addEventListener('input',calculate);
});

renderStages();
calculate();
</script>
</body>
</html>
